name: 🐛 Bug report
description: Report a reproducible problem in an Open Feach package.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! Please fill in what you can — a clear
        reproduction helps us fix it faster.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong? What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps, commands, or a launch file that triggers the bug.
      placeholder: |
        1. ros2 launch ...
        2. ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: distro
    attributes:
      label: ROS 2 distribution
      options:
        - Rolling
        - Jazzy
        - Humble
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version / commit
      description: Package version (from package.xml) or the git commit you are on.
    validations:
      required: false
  - type: input
    id: platform
    attributes:
      label: OS / platform
      placeholder: e.g. Ubuntu 24.04, arm64
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste console output or a stack trace. This is automatically formatted as code.
      render: shell
    validations:
      required: false
