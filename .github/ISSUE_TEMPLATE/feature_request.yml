name: ✨ Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! For open-ended discussion, consider
        [Discussions](https://github.com/orgs/open-feach/discussions) instead.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the behavior or API if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: distro
    attributes:
      label: Target ROS 2 distribution(s)
      multiple: true
      options:
        - Rolling
        - Jazzy
        - Humble
    validations:
      required: false
